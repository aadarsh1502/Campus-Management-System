{% extends 'campus/base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card shadow-lg p-4 rounded-4" style="width: 380px; background-color: #fff8f0;">
        <h3 class="card-title text-center mb-4 fw-bold">Smart Campus Login</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control rounded-pill" placeholder="Enter username">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control rounded-pill" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-warning w-100 rounded-pill fw-bold">Login</button>
        </form>
    </div>
</div>
{% endblock %}
