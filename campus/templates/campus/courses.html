{% extends 'campus/base.html' %}
{% block content %}
<h2>Courses</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Credits</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.code }}</td>
            <td>{{ course.name }}</td>
            <td>{{ course.credits }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No courses available</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
