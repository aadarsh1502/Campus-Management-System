{% extends 'campus/base.html' %}
{% block content %}
<h2>Classrooms</h2>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Block</th>
            <th>Capacity</th>
        </tr>
    </thead>
    <tbody>
        {% for room in classrooms %}
        <tr>
            <td>{{ room.name }}</td>
            <td>{{ room.block.name }}</td>
            <td>{{ room.capacity }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No classrooms available</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
